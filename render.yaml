databases:
  - name: sarvpratham-db
    plan: free
    databaseName: sarvpratham
    user: sarvpratham

services:
  - type: web
    name: sarvpratham-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sarvpratham-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://sarvprathameduconsultants.com,https://www.sarvprathameduconsultants.com"
